llm_patterns:
  tone_register: casual
  tone_examples:
  - anybody know of any good guides
  - im noob---
  - ah k
  - pretty sure
  - thanks...trying in a second
  vagueness_rate: moderate
  vagueness_markers:
  - What do you mean?
  - if its that what u mean
  - you may want to look into
  - maybe
  - pretty sure
  - guessing here
  - I suppose
  - sounds like
  - Any idea how to fix this?
  dialog_act_sequence:
  - open_broadcast_question
  - helper_requests_clarification_or_scope
  - asker_adds_context_and_self-assesses_expertise
  - helper_gives_short_command_link_or_pointer
  - asker_confirms_or_tests
  - bot_or_side_user_interjects
  - asker_reports_result_or_blocker
  - thread_either_gets_partial_answer_or_trails_off
  resolution_shape: resolved_partial
  drift_rate: medium
  threading_style: mention_heavy
  rendering_hints:
  - Use timestamped one-line chat turns with angle-bracket nicknames.
  - Address users directly by nick at the start of replies.
  - 'Keep most technical advice terse: commands, paths, links, or short checks.'
  - Let users reveal missing context gradually after clarification questions.
  - Include occasional bot notices, wrong bot triggers, or paste warnings.
  - Allow side chatter and interleaved unrelated troubleshooting to interrupt.
  - End some threads with thanks, partial confirmation, or no final outcome.
  avoid:
  - Do not produce a polished summary or formal ticket-style resolution.
  - Do not make every helper certain or fully correct.
  - Do not keep the conversation perfectly on one topic.
  - Do not over-explain every command in tutorial prose.
