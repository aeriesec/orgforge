llm_patterns:
  tone_register: casual
  tone_examples:
  - hey guys, i got a problem....
  - any ideas???
  - huh?
  - ok / cool thanks guys
  - wtf / nvm / brb
  vagueness_rate: moderate
  vagueness_markers:
  - any ideas
  - for whatever reason
  - that's quite tricky
  - settings like what, from where?
  - I don't know
  - I imagine
  - ought to be
  - I'm unsure
  - maybe
  - I thought
  dialog_act_sequence:
  - broadcast_question_or_problem
  - helper_requests_clarification_or_confirms_context
  - asker_provides_partial_context
  - helper_offers_short_diagnostic_or_pointer
  - asker_signals_confusion_or_followup_gap
  - helper_expands_with_steps_or_alternative
  - asker_acknowledges_or_thanks
  - thread_either_trails_off_or_defers_future_attempt
  resolution_shape: resolved_partial
  drift_rate: low
  threading_style: mention_heavy
  rendering_hints:
  - Use timestamped, nick-prefixed short chat lines.
  - Let the initial question be under-specified and mildly urgent or confused.
  - Have helpers answer with terse commands, package names, menu paths, or links.
  - Include clarification turns like 'what version?', 'from where?', or 'are you set
    up for X?'.
  - Allow partial resolution with thanks, deferral, or a final follow-up question
    rather than a polished close.
  - Use casual IRC spelling, abbreviations, typos, and punctuation bursts.
  - Address people by nick frequently instead of quoting prior messages.
  avoid:
  - Do not produce a clean executive summary at the end.
  - Do not make every thread fully resolved.
  - Do not use formal ticketing language or structured troubleshooting templates.
  - Do not remove uncertainty; helpers often hedge or give approximate directions.
  - Do not make the conversation single-speaker or monologic.
