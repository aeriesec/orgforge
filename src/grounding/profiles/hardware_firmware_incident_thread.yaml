llm_patterns:
  tone_register: casual
  tone_examples:
  - can someone help me with a simple xterm problem?
  - not sure what it is, you can figure it out
  - Thanks, I'll give that a try right now
  - sorry, I didn't even see your question
  - what do you mean urlin2u?
  vagueness_rate: moderate
  vagueness_markers:
  - not sure
  - probably
  - i think
  - afaik
  - let me see if I can find it
  - you could probably
  - try
  - might be
  - or whatever it is
  - any ideas?
  dialog_act_sequence:
  - initial_question_or_problem_statement
  - optional_repeat_or_clarification
  - helper_requests_context_or_redirects_to_ask_properly
  - user_provides_environment_or_constraint
  - helper_gives_short_command_or_menu_path
  - user_asks_followup_or_reports_attempt
  - helper_corrects_typo_or_refines_instruction
  - user_thanks_or_thread_trails_off
  resolution_shape: resolved_partial
  drift_rate: medium
  threading_style: mention_heavy
  rendering_hints:
  - Use timestamped short chat lines with nicknames in angle brackets.
  - Have helpers address users by nick frequently before giving advice.
  - Let commands and paths appear inline, often without much explanation.
  - Include typos, abbreviations, lowercase phrasing, and quick corrections.
  - Allow repeated questions, follow-up constraints, and partial diagnostics.
  - End many threads after thanks, a command to try, or no confirmation.
  - Permit occasional bot interjections, redirects, or mild off-topic chatter.
  avoid:
  - Do not produce a clean executive summary at the end.
  - Do not make every incident fully diagnosed and closed.
  - Do not use polished corporate incident-management language.
  - Do not remove typos, fragmentary messages, or command-line shorthand.
  - Do not make turn-taking perfectly orderly.
