llm_patterns:
  tone_register: mixed
  tone_examples:
  - I am submitting a formal safety complaint regarding a potentially dangerous defect
  - This is a serious safety concern
  - known issue, no known hardware cause. In other words live with it.
  - Luckily no other vehicles were hit.
  - I guess they're waiting for somebody to have an accident
  vagueness_rate: moderate
  vagueness_markers:
  - potentially
  - I believe
  - appears to be
  - unsure of actual issue
  - presumed
  - may be unable
  - has not yet been formally confirmed
  - could not replicate
  - known issue
  - no known hardware cause
  dialog_act_sequence:
  - identify_vehicle_or_component
  - describe_incident_or_recurring_defect
  - give_operating_conditions
  - state_safety_consequence
  - mention_prior_warnings_or_frequency
  - report_service_or_manufacturer_response
  - note_evidence_or_inspection_status
  - assert_unresolved_safety_concern
  resolution_shape: unresolved
  drift_rate: low
  threading_style: linear
  rendering_hints:
  - Use first-person complaint narration with vehicle model, date, mileage, location,
    or software version when available.
  - Frame the defect as a safety risk rather than a general product dissatisfaction
    issue.
  - Include manufacturer or service-center responses that do not fully resolve the
    problem.
  - Allow typos, uneven capitalization, legal references, invoice numbers, VIN redactions,
    and bracketed privacy placeholders.
  - Often end with the issue still active, awaiting parts, inspection, or official
    confirmation.
  - Mention recurrence, warning messages, dashcam footage, diagnostics, or repair
    attempts as supporting detail.
  avoid:
  - Do not write a clean executive summary with a neat conclusion.
  - Do not make the complaint sound like a polished legal brief throughout; preserve
    some ordinary-driver phrasing.
  - Do not resolve the defect unless the artifact explicitly says it was fixed.
  - Do not add off-topic conversation or multi-speaker dialogue.
