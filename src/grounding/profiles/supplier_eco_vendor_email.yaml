llm_patterns:
  tone_register: semi-formal
  tone_examples:
  - Please review the attached ECO and advise on impact.
  - Can you confirm timing and any cost implications?
  - We will proceed once supplier approval is received.
  - Let us know if additional documentation is required.
  vagueness_rate: moderate
  vagueness_markers:
  - please advise
  - as soon as possible
  - pending review
  - if applicable
  - at your earliest convenience
  - we believe
  - may impact
  - to be confirmed
  - subject to approval
  dialog_act_sequence:
  - announce_or_forward_eco
  - identify_affected_part_numbers_or_revisions
  - request_supplier_review
  - ask_for_cost_lead_time_or_inventory_impact
  - vendor_acknowledges_receipt
  - vendor_requests_clarification_or_documents
  - buyer_provides_attachment_or_context
  - vendor_commits_to_review_timeline
  - defer_until_internal_or_customer_approval
  resolution_shape: deferred
  drift_rate: low
  threading_style: quote_heavy
  rendering_hints:
  - Use concise business-email phrasing with polite requests.
  - Include ECO, part number, revision, drawing, attachment, lead time, and approval
    references.
  - Let the thread move through acknowledgments and requests for clarification rather
    than a single complete answer.
  - Use quoted prior-email fragments or forwarded context to show threading.
  - End many exchanges with pending review, approval, quote, or confirmation.
  - Keep off-topic chatter minimal and operational.
  avoid:
  - Do not produce a clean executive summary at the end.
  - Do not make every issue fully resolved in one message.
  - Do not use casual chat slang or emotional language.
  - Do not omit practical identifiers such as ECO number, revision, supplier, attachment,
    or affected item.
