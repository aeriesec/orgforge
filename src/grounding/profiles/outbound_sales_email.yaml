llm_patterns:
  tone_register: semi-formal
  tone_examples:
  - Hi, Sorry for the delay in responding.
  - Thanks for the thorough review.
  - 'I think there are two broad ways to achieve this:'
  - +1 (non-binding)
  - Cheers -Andreas
  vagueness_rate: moderate
  vagueness_markers:
  - I think
  - probably
  - somehow
  - I’m not sure
  - does it make sense?
  - would suggest
  - might look like
  - I would prefer
  - I don’t expect
  - along the right lines
  dialog_act_sequence:
  - email_header_metadata
  - brief_greeting
  - acknowledge_previous_message_or_delay
  - state_position_or_vote
  - provide_technical_rationale
  - ask_clarifying_question_or_request_update
  - propose_alternative_or_next_step
  - brief_signoff
  - quote_prior_thread
  resolution_shape: trailing_off
  drift_rate: low
  threading_style: quote_heavy
  rendering_hints:
  - Start with mailing-list metadata such as From, Date, and Subject.
  - Use short greetings and concise acknowledgements before the substantive reply.
  - Preserve quoted prior messages with nested angle brackets.
  - Use compact technical labels or numbered points such as AS1, jr1, or option a/b.
  - Let threads continue without a polished final conclusion.
  - Include terse votes like '+1' with optional binding status.
  - Keep side comments minimal and tied to process or implementation details.
  avoid:
  - Do not write a polished sales pitch or marketing-style call to action.
  - Do not produce a clean executive summary at the end.
  - Do not remove quoted thread history.
  - Do not make every issue fully resolved in the same message.
  - Do not overuse casual banter or unrelated chatter.
