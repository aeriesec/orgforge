tech_stack:
  database: "PostgreSQL for accounts, inventory, and rider profiles; TimescaleDB for ride telemetry; S3 for raw ride packets and safety exports."
  backend_language: "Python FastAPI for cloud APIs, Go workers for telemetry ingestion, and C for embedded firmware."
  frontend_language: "TypeScript React for the dealer dashboard and internal launch readiness tools."
  mobile: "React Native for the Atlas rider and dealer companion app, with BLE pairing and OTA firmware orchestration."
  infra: "AWS ECS, IoT Core, S3, Lambda, and Terraform-managed VPCs; production-like staging is intentionally small and easy to overload."
  message_queue: "Kafka for ride telemetry streams plus Redis for OTA retry coordination and short-lived app sessions."
  source_control: "Gitea repos for firmware, cloud-api, mobile-app, ml-pipeline, and hardware-test-rig."
  ci_cd: "Gitea Actions plus a hardware bench runner that posts cold-start validation artifacts back to launch tickets."
  monitoring: "Datadog, Sentry, CloudWatch, and PagerDuty for app, API, telemetry, and OTA incidents."
  notable_quirks: "Incident uploads still omit torque_sensor_revision, dealer service-mode rides can leak into activation metrics, and OTA retry state is split between the app and backend."

